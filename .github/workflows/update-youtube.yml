name: Update YouTube embeds

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update youtube.json and vod.json
        run: python .github/scripts/update-youtube.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add youtube.json vod.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update YouTube latest video and last VOD embeds"
            git push
          fi
